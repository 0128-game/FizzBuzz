<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FizzBuzz Speed Challenge</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            text-align: center;
            background: #34495e;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 400px;
        }

        h1 { margin-top: 0; color: #f1c40f; }

        #display-number {
            font-size: 5rem;
            font-weight: bold;
            margin: 1rem 0;
            height: 8rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .info { font-size: 1.2rem; margin-bottom: 1rem; }
        .score-board { font-size: 1.5rem; font-weight: bold; color: #2ecc71; }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
            font-size: 0.9rem;
            text-align: left;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
        }

        .key-hint { color: #e74c3c; font-weight: bold; }

        #message {
            height: 1.5rem;
            color: #e74c3c;
            font-weight: bold;
            margin-top: 10px;
        }

        #start-btn {
            padding: 10px 20px;
            font-size: 1.2rem;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        #start-btn:hover { background: #2ecc71; }

        /* スライダーのスタイル */
     .settings {
        margin: 20px 0;
        background: rgba(0,0,0,0.2);
        padding: 10px;
        border-radius: 8px;
    }

    input[type="range"] { 
        width: 100%; 
        cursor: pointer; 
    }
    </style>
</head>
<body>

<div id="game-container">
    <h1>FizzBuzz Challenge</h1>
<div class="score-board">
    Score: <span id="score">0</span> | 
    Best: <span id="high-score">0</span>
</div>    
    <div id="display-number">?</div>

    <div class="settings">
        <label>制限時間: <span id="time-val">1.0</span>秒</label><br>
        <input type="range" id="time-slider" min="0.2" max="3.0" step="0.1" value="1.0">
    </div>
    
    <div id="message"></div>
    <button id="start-btn">ゲームスタート</button>

    <div class="controls">
        <div>数字: <span class="key-hint">Space</span></div>
        <div>Fizz (3の倍数): <span class="key-hint">F</span></div>
        <div>Buzz (5の倍数): <span class="key-hint">B</span></div>
        <div>FizzBuzz (15の倍数): <span class="key-hint">G</span></div>
    </div>
</div>

<script>
    let currentNum = 0;
    let score = 0;
    let isPlaying = false;
    let timer = null;
    const TIME_LIMIT = 1000; // 1秒制限

    const display = document.getElementById('display-number');
    const scoreElement = document.getElementById('score');
    const message = document.getElementById('message');
    const startBtn = document.getElementById('start-btn');
    const slider = document.getElementById('time-slider');
    const timeValLabel = document.getElementById('time-val');
    const highScoreElement = document.getElementById('high-score');

// 起動時に保存されたスコアを読み込む
let highScore = localStorage.getItem('fizzbuzz-highscore') || 0;
highScoreElement.innerText = highScore;

// スライダーを動かした時に数値を表示
slider.addEventListener('input', () => {
    timeValLabel.innerText = slider.value;
});

    function getCorrectKey(num) {
        if (num % 15 === 0) return 'g';
        if (num % 3 === 0) return 'f';
        if (num % 5 === 0) return 'b';
        return ' ';
    }

    function startGame() {
        currentNum = 1; // 1からスタート
        score = 0;
        isPlaying = true;
        scoreElement.innerText = score;
        message.innerText = "";
        startBtn.style.display = "none";
        slider.disabled = true; // プレイ中は操作不可にする
        nextTurn();
    }
    
    function nextTurn() {
        // 表示と判定用の数値を一致させる
        display.innerText = currentNum - 1; 
        resetTimer();
    }

    function resetTimer() {
        clearTimeout(timer);
        // スライダーの値(秒)をミリ秒に変換してセット
        const limit = parseFloat(slider.value) * 1000; 
        timer = setTimeout(() => {
        gameOver("時間切れ！遅すぎます！");
    }, limit);
}

    function gameOver(msg) {
        isPlaying = false;
        clearTimeout(timer);
        message.innerText = msg;
        display.innerText = "×";
        startBtn.style.display = "inline-block";
        slider.disabled = false; // 終了後に変更可能にする
        startBtn.innerText = "もう一度プレイ";
    }function gameOver(msg) {
    isPlaying = false;
    clearTimeout(timer);
    
    // ハイスコア判定と保存
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('fizzbuzz-highscore', highScore);
        highScoreElement.innerText = highScore;
        msg += " 🎉ハイスコア更新！";
    }

    message.innerText = msg;
    display.innerText = "×";
    startBtn.style.display = "inline-block";
    startBtn.innerText = "もう一度プレイ";
    slider.disabled = false;
}

    window.addEventListener('keydown', (e) => {
        if (!isPlaying) return;

        const keyPressed = e.key.toLowerCase();
        // 表示されている currentNum をそのまま判定に使う
        const correctKey = getCorrectKey(currentNum);

        if (e.key === " ") e.preventDefault();

        if (keyPressed === correctKey) {
            score++;
            currentNum++; // 正解したら次の数字へ
            scoreElement.innerText = score;
            nextTurn();
        } else {
            const expected = correctKey === ' ' ? 'Space' : correctKey.toUpperCase();
            gameOver(`ミス！ ${currentNum} の正解は ${expected} でした`);
        }
    });
    
    startBtn.addEventListener('click', startGame);
</script>

</body>
</html>
