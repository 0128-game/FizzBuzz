<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FizzBuzz Speed Challenge</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #game-container {
            text-align: center;
            background: #16213e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 2px solid #0f3460;
            width: 350px;
        }

        h1 { margin-bottom: 10px; color: #4db8ff; }

        #display-number {
            font-size: 6rem;
            font-weight: 900;
            margin: 20px 0;
            color: #e94560;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
            min-height: 1.2em;
        }

        .score-display { font-size: 1.2rem; margin-bottom: 20px; color: #00d2ff; }

        .controls-guide {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            font-size: 0.85rem;
        }

        .key { color: #f1c40f; font-weight: bold; border: 1px solid #f1c40f; padding: 1px 5px; border-radius: 3px; }

        #msg { color: #ff4d4d; font-weight: bold; margin: 15px 0; min-height: 1.5em; }

        #start-btn {
            background: #4db8ff;
            border: none;
            padding: 12px 30px;
            color: #1a1a2e;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
        }

        #start-btn:hover { background: #00d2ff; transform: scale(1.05); }
    </style>
</head>
<body>

<div id="game-container">
    <h1>FizzBuzz</h1>
    <div class="score-display">Score: <span id="score">0</span></div>
    
    <div id="display-number">START</div>
    
    <div id="msg"></div>
    <button id="start-btn">ゲーム開始</button>

    <div class="controls-guide">
        <div>数字: <span class="key">Space</span></div>
        <div>Fizz: <span class="key">F</span></div>
        <div>Buzz: <span class="key">B</span></div>
        <div>FizzBuzz: <span class="key">G</span></div>
    </div>
</div>

<script>
    let currentNum = 1;
    let score = 0;
    let isPlaying = false;
    let timer = null;
    const TIME_LIMIT = 1000;

    const display = document.getElementById('display-number');
    const scoreElement = document.getElementById('score');
    const msgElement = document.getElementById('msg');
    const startBtn = document.getElementById('start-btn');

    // 表示されている数字(num)に対して、押すべき正しいキーを判定する
    function checkCorrectKey(num) {
        if (num % 15 === 0) return 'g';
        if (num % 3 === 0) return 'f';
        if (num % 5 === 0) return 'b';
        return ' ';
    }

    function startGame() {
        currentNum = 1;
        score = 0;
        isPlaying = true;
        scoreElement.innerText = score;
        msgElement.innerText = "";
        startBtn.style.visibility = "hidden";
        updateDisplay();
    }

    function updateDisplay() {
        display.innerText = currentNum;
        startTimer();
    }

    function startTimer() {
        clearTimeout(timer);
        timer = setTimeout(() => {
            endGame("タイムオーバー！");
        }, TIME_LIMIT);
    }

    function endGame(reason) {
        isPlaying = false;
        clearTimeout(timer);
        msgElement.innerText = reason;
        display.innerText = "GG";
        startBtn.style.visibility = "visible";
        startBtn.innerText = "リトライ";
    }

    window.addEventListener('keydown', (e) => {
        if (!isPlaying) return;

        // スペースキーでスクロールするのを防止
        if (e.key === " ") e.preventDefault();

        const inputKey = e.key.toLowerCase();
        const correctKey = checkCorrectKey(currentNum);

        if (inputKey === correctKey) {
            // 正解の場合
            score++;
            currentNum++;
            scoreElement.innerText = score;
            updateDisplay();
        } else {
            // 不正解の場合
            let answerLabel = "";
            if (correctKey === 'g') answerLabel = "G (FizzBuzz)";
            else if (correctKey === 'f') answerLabel = "F (Fizz)";
            else if (correctKey === 'b') answerLabel = "B (Buzz)";
            else answerLabel = "Space (数字)";

            endGame(`ミス！ ${currentNum} は ${answerLabel} でした`);
        }
    });

    startBtn.addEventListener('click', startGame);
</script>

</body>
</html>
