<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FizzBuzz Speed Challenge</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            text-align: center;
            background: #34495e;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 400px;
        }

        h1 { margin-top: 0; color: #f1c40f; }

        #display-number {
            font-size: 5rem;
            font-weight: bold;
            margin: 1rem 0;
            height: 8rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .info { font-size: 1.2rem; margin-bottom: 1rem; }
        .score-board { font-size: 1.5rem; font-weight: bold; color: #2ecc71; }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
            font-size: 0.9rem;
            text-align: left;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
        }

        .key-hint { color: #e74c3c; font-weight: bold; }

        #message {
            height: 1.5rem;
            color: #e74c3c;
            font-weight: bold;
            margin-top: 10px;
        }

        #start-btn {
            padding: 10px 20px;
            font-size: 1.2rem;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        #start-btn:hover { background: #2ecc71; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>FizzBuzz Challenge</h1>
    <div class="score-board">Score: <span id="score">0</span></div>
    
    <div id="display-number">?</div>
    
    <div id="message"></div>
    <button id="start-btn">ゲームスタート</button>

    <div class="controls">
        <div>数字: <span class="key-hint">Space</span></div>
        <div>Fizz (3の倍数): <span class="key-hint">F</span></div>
        <div>Buzz (5の倍数): <span class="key-hint">B</span></div>
        <div>FizzBuzz (15の倍数): <span class="key-hint">G</span></div>
    </div>
</div>

<script>
    let currentNum = 0;
    let score = 0;
    let isPlaying = false;
    let timer = null;
    const TIME_LIMIT = 1000; // 1秒制限

    const display = document.getElementById('display-number');
    const scoreElement = document.getElementById('score');
    const message = document.getElementById('message');
    const startBtn = document.getElementById('start-btn');

    function getCorrectKey(num) {
        if (num % 15 === 0) return 'g';
        if (num % 3 === 0) return 'f';
        if (num % 5 === 0) return 'b';
        return ' ';
    }

    function startGame() {
        currentNum = 1; // 1からスタート
        score = 0;
        isPlaying = true;
        scoreElement.innerText = score;
        message.innerText = "";
        startBtn.style.display = "none";
        nextTurn();
    }
    
    function nextTurn() {
        // 表示と判定用の数値を一致させる
        display.innerText = currentNum - 1; 
        resetTimer();
    }

    function resetTimer() {
        clearTimeout(timer);
        timer = setTimeout(() => {
            gameOver("時間切れ！遅すぎます！");
        }, TIME_LIMIT);
    }

    function gameOver(msg) {
        isPlaying = false;
        clearTimeout(timer);
        message.innerText = msg;
        display.innerText = "×";
        startBtn.style.display = "inline-block";
        startBtn.innerText = "もう一度プレイ";
    }

    window.addEventListener('keydown', (e) => {
        if (!isPlaying) return;

        const keyPressed = e.key.toLowerCase();
        // 表示されている currentNum をそのまま判定に使う
        const correctKey = getCorrectKey(currentNum);

        if (e.key === " ") e.preventDefault();

        if (keyPressed === correctKey) {
            score++;
            currentNum++; // 正解したら次の数字へ
            scoreElement.innerText = score;
            nextTurn();
        } else {
            const expected = correctKey === ' ' ? 'Space' : correctKey.toUpperCase();
            gameOver(`ミス！ ${currentNum} の正解は ${expected} でした`);
        }
    });
    
    startBtn.addEventListener('click', startGame);
</script>

</body>
</html>
